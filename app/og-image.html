<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200, height=630, initial-scale=1.0">
  <title>OG Image - Vibe Styles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      overflow: hidden;
      background: #09090b;
    }

    .og-container {
      width: 1200px;
      height: 630px;
      position: relative;
      overflow: hidden;
      background: #09090b;
    }

    /* Mesh gradient background */
    .mesh-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 10% 90%, rgba(139, 92, 246, 0.25) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 85% 20%, rgba(6, 182, 212, 0.20) 0%, transparent 55%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(236, 72, 153, 0.10) 0%, transparent 50%);
    }

    /* Subtle noise texture */
    .noise {
      position: absolute;
      inset: 0;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 128px 128px;
    }

    /* Dot grid pattern */
    .dot-grid {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    /* Content layout */
    .content {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      padding: 0 80px;
      gap: 64px;
    }

    .left {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 24px;
      z-index: 2;
    }

    /* Logo + brand */
    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      width: 56px;
      height: 56px;
      border-radius: 14px;
    }

    .brand-name {
      font-size: 22px;
      font-weight: 700;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* Title */
    .title {
      font-size: 64px;
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.03em;
      background: linear-gradient(160deg, #ffffff 30%, #a78bfa 70%, #67e8f9 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Tagline */
    .tagline {
      font-size: 22px;
      font-weight: 500;
      color: rgba(255,255,255,0.55);
      line-height: 1.5;
      max-width: 480px;
    }

    .tagline strong {
      color: rgba(255,255,255,0.85);
      font-weight: 600;
    }

    /* Tags */
    .tags {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }

    .tag {
      padding: 7px 18px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      border: 1px solid;
    }

    .tag-purple {
      background: rgba(139, 92, 246, 0.12);
      color: #c4b5fd;
      border-color: rgba(139, 92, 246, 0.25);
    }

    .tag-cyan {
      background: rgba(6, 182, 212, 0.12);
      color: #67e8f9;
      border-color: rgba(6, 182, 212, 0.25);
    }

    .tag-pink {
      background: rgba(236, 72, 153, 0.12);
      color: #f9a8d4;
      border-color: rgba(236, 72, 153, 0.25);
    }

    /* Right side — style preview mosaic */
    .right {
      width: 380px;
      height: 420px;
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr 1fr;
      gap: 12px;
      transform: perspective(900px) rotateY(-6deg) rotateX(2deg);
    }

    .tile {
      border-radius: 16px;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 14px;
    }

    .tile-label {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.7);
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* Tile styles — each with a unique mini-design */
    .tile-glass {
      background: linear-gradient(135deg, rgba(139,92,246,0.15), rgba(6,182,212,0.10));
      backdrop-filter: blur(12px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .tile-brutalist {
      background: #18181b;
      border: 2px solid #fafafa;
      border-radius: 0;
    }
    .tile-brutalist .tile-label { color: #fafafa; }

    .tile-neo {
      background: linear-gradient(145deg, #1e1e22, #151518);
      box-shadow: 6px 6px 12px rgba(0,0,0,0.5), -4px -4px 10px rgba(255,255,255,0.03);
    }

    .tile-gradient {
      background: linear-gradient(135deg, #7c3aed, #ec4899, #f59e0b);
    }

    .tile-minimal {
      background: #fafafa;
      border-color: rgba(0,0,0,0.06);
    }
    .tile-minimal .tile-label { color: #18181b; }

    .tile-dark {
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
      border-color: rgba(99,102,241,0.2);
    }

    /* URL */
    .url-bar {
      position: absolute;
      bottom: 28px;
      right: 48px;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 3;
    }

    .url-text {
      font-size: 15px;
      font-weight: 500;
      color: rgba(255,255,255,0.35);
      font-family: 'JetBrains Mono', monospace;
    }

    /* Accent glow line at top */
    .top-glow {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #8B5CF6, #06b6d4, transparent);
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="og-container">
    <div class="mesh-bg"></div>
    <div class="noise"></div>
    <div class="dot-grid"></div>
    <div class="top-glow"></div>

    <div class="content">
      <!-- Left — Text -->
      <div class="left">
        <div class="brand">
          <img src="assets/images/logo.png" alt="Vibe Styles" class="logo">
          <span class="brand-name">Vibe Styles</span>
        </div>
        <div class="title">Estilos de UI<br>para Vibe Coding</div>
        <div class="tagline">Coleção curada de <strong>estilos visuais</strong> com prompts prontos para usar com <strong>IA generativa</strong></div>
        <div class="tags">
          <span class="tag tag-purple">Prompts Prontos</span>
          <span class="tag tag-cyan">Open Source</span>
          <span class="tag tag-pink">Vibe Coding</span>
        </div>
      </div>

      <!-- Right — Style mosaic -->
      <div class="right">
        <div class="tile tile-glass"><span class="tile-label">Glass</span></div>
        <div class="tile tile-brutalist"><span class="tile-label">Brutalist</span></div>
        <div class="tile tile-neo"><span class="tile-label">Neumorphism</span></div>
        <div class="tile tile-gradient"><span class="tile-label">Gradient</span></div>
        <div class="tile tile-minimal"><span class="tile-label">Minimal</span></div>
        <div class="tile tile-dark"><span class="tile-label">Dark UI</span></div>
      </div>
    </div>

    <div class="url-bar">
      <span class="url-text">vibe.ft.ia.br</span>
    </div>
  </div>
</body>
</html>
